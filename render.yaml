services:
  - type: web
    name: roblox-script-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: YOOMONEY_SECRET
        sync: false
      - key: YOOMONEY_WALLET
        sync: false
      - key: SCRIPT_URL_BASE
        sync: false
      - key: SCRIPT_URL_ULTIMATE
        sync: false
      - key: DB_PATH
        value: /data/bot.db
    disk:
      name: botdata
      mountPath: /data
      sizeGB: 1
